<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; padding-top: 50px; }
        .scoreboard { font-size: 24px; margin-bottom: 20px; display: flex; justify-content: center; gap: 40px; }
        .buttons { display: flex; justify-content: center; gap: 15px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; background-color: #0078d4; color: white; transition: 0.3s; }
        button:hover { background-color: #005a9e; transform: scale(1.05); }
        #message { margin-top: 30px; font-size: 20px; color: #333; height: 30px; }
    </style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="scoreboard">
        <div>Player: <span id="player-score">0</span></div>
        <div>Computer: <span id="computer-score">0</span></div>
    </div>
    <div class="buttons">
        <button onclick="playRound('rock')">Rock</button>
        <button onclick="playRound('paper')">Paper</button>
        <button onclick="playRound('scissors')">Scissors</button>
    </div>
    <div id="message">Make your move to start the game!</div>

    <script src="script.js"></script>
</body>
</html>
